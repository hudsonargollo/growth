name = "content-engine"
main = "src/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain — routes all traffic from this hostname to this Worker
routes = [
  { pattern = "fabricadeconteudo.clubemkt.digital", custom_domain = true }
]

[assets]
directory = "../client/dist"
binding = "ASSETS"

# ── KV namespace — encrypted API key storage ──────────────────────────────────
# Create with: npx wrangler kv:namespace create KV1
# Then paste the returned id below.
[[kv_namespaces]]
binding = "KV1"
id = "6904dec6f05f4ad99aff645e8a533e5c"

# ── R2 bucket — generated video/image assets + final renders ──────────────────
# Create with: npx wrangler r2 bucket create growth-video-assets
# Stores: Higgsfield clips/stills (copied off their CDN so they don't expire),
# ElevenLabs audio, and the final .mp4 returned by the Cloud Run renderer.
[[r2_buckets]]
binding     = "VIDEO_ASSETS"
bucket_name = "growth-video-assets"

[vars]
NODE_ENV           = "production"
LLM_MODEL          = "claude-haiku-4-5-20251001"
ML_SITE            = "brazil"
EVOLUTION_API_URL  = "https://evo.clubemkt.digital"
EVOLUTION_INSTANCE = "FABRICADECONTEUDO"

# Cron trigger — runs comment agent every 4 hours
[triggers]
crons = ["0 */4 * * *"]

# ── Secrets (set via: wrangler secret put KEY_NAME) ───────────────────────────
# Auth middleware (Phase 2 — required):
#   SUPABASE_ANON_KEY             (Settings → API → anon/public key — used for user JWT client)
#
# Required for mining:
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   ML_APP_ID                   (MercadoLibre app — developers.mercadolibre.com)
#   ML_CLIENT_SECRET            (MercadoLibre app secret)
#
# MercadoPago (payments — already set):
#   MERCADOPAGO_ACCESS_TOKEN    ✓ set
#   MERCADOPAGO_CLIENT_ID       ✓ set
#   MERCADOPAGO_CLIENT_SECRET   ✓ set
#
# Required for scripts:
#   OPENAI_API_KEY
#
# Required for voiceover:
#   ELEVENLABS_API_KEY
#
# Required for the video generator (Phase 0+):
#   HIGGSFIELD_API_KEY          (resolved via resolveKey — Wrangler secret or encrypted KV)
#   RENDER_WEBHOOK_SECRET       (HMAC shared secret signing Cloud Run → Worker render callbacks)
#   RENDER_SERVICE_URL          (Cloud Run Remotion renderer endpoint, e.g. https://renderer-xxx.run.app)
#
# Required for delivery:
#   WHATSAPP_TOKEN
#   WHATSAPP_PHONE_NUMBER_ID
#
# Required for comment agent:
#   YOUTUBE_API_KEY
#   YOUTUBE_CHANNEL_ID          (or YOUTUBE_VIDEO_IDS = "id1,id2,id3")
#   YOUTUBE_OAUTH_TOKEN         (optional — needed to actually post replies)
#   OPENAI_API_KEY
#
# Encryption:
#   CREDENTIALS_SECRET          (32-byte hex — already set)
