# Supabase project configuration
# Generated for: Growth Clube
# Docs: https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = true

[auth]
enabled = true
# The base URL of your website — used for redirect URLs and email templates.
# Update this to your production domain.
site_url = "https://growth-clube.hudsonargollo2.workers.dev"
additional_redirect_urls = [
  "http://localhost:5173",
  "http://localhost:5174",
  "https://content-engine.hudsonargollo2.workers.dev",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # set true in prod for email verification

[auth.sms]
enable_signup = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = false

# ── Linked Supabase project ───────────────────────────────────────────────────
# Run: supabase link --project-ref <your-project-ref>
# Find your project ref at: https://supabase.com/dashboard/project/<ref>/settings/general
# It looks like: abcdefghijklmnop (16 chars)
#
# After linking:
#   supabase db push          → applies pending migrations to remote
#   supabase db diff          → shows what has changed
#   supabase db reset         → resets local DB and re-runs all migrations
#   supabase migration list   → shows applied vs pending migrations
